<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fullscreen GIF</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}

img {
    width: 100vw;
    height: 100vh;
    object-fit: cover; /* fills the screen */
    display: block;
}
</style>
</head>
<body>
    <img src="ikkenomer.gif" alt="Fullscreen GIF">
</body>
</html>
