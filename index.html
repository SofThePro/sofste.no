<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yo Yo Yo</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #111, #1f1f1f);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
        }

        h1 {
            font-size: 3rem;
            background: linear-gradient(90deg, #00f5a0, #00d9f5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.2rem;
            color: #ccc;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: #00d9f5;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #00f5a0;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Yo Yo Yo 👋</h1>
        <p>Welcome to this smooth modern page.  
        Keep it chill, keep it fresh, and enjoy the vibe.</p>
        <button class="btn" onclick="alert('yo yo yo 😎')">Click Me</button>
    </div>
</body>
</html>
